<style>
  body { background: #F5E6CC; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; font-family: "Noto Serif JP", serif; padding: 40px 20px; }
  .cards { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; max-width: 500px; width: 100%; }
  .card {
    border-radius: 4px; overflow: hidden; cursor: pointer;
    border: 1px solid rgba(92,52,35,0.15);
    background: white;
    box-shadow: 0 4px 20px rgba(92,52,35,0.12), 0 1px 4px rgba(92,52,35,0.08);
    transition: all 0.2s;
  }
  .card:hover {
    box-shadow: 0 8px 32px rgba(92,52,35,0.2), 0 2px 8px rgba(92,52,35,0.12);
    transform: translateY(-2px);
  }
  .card.selected {
    border: 2px solid #5C3423;
    box-shadow: 0 8px 32px rgba(92,52,35,0.25);
  }
  .card-img {
    width: 100%; aspect-ratio: 1/1; object-fit: cover;
    display: block;
    filter: sepia(15%) contrast(1.05);
  }
  .card-body {
    padding: 16px;
    border-top: 1px solid rgba(92,52,35,0.08);
  }
  .card-en { font-size: 9px; letter-spacing: 0.35em; color: #D4A96A; margin-bottom: 4px; }
  .card-name { font-size: 13px; letter-spacing: 0.15em; color: #5C3423; font-weight: 500; margin-bottom: 4px; }
  .card-price { font-size: 17px; color: #8B6A52; font-family: "Cormorant Garamond", serif; font-weight: 300; }
  .card-desc { font-size: 10px; color: #8B6A52; margin-top: 6px; line-height: 1.7; }
</style>
